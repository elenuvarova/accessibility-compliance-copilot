<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessibility Compliance Copilot</title>
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="Component-level accessibility audit — honest about what automation can and can't cover. WCAG 2.2, EAA & ADA risk scoring."
    />
    <meta property="og:title" content="Accessibility Compliance Copilot" />
    <meta
      property="og:description"
      content="Component-level accessibility audit — honest about what automation can and can't cover. WCAG 2.2, EAA & ADA risk scoring."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <script>
      // Pre-paint theme: apply stored theme before React mounts to avoid a flash.
      // Mirrors useTheme() in App.jsx — key "a11y-theme", light => data-theme="light", dark => "".
      (function () {
        try {
          var t = localStorage.getItem("a11y-theme") || "dark";
          document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
